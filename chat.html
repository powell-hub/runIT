<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
</head>

<body>

<div id="chatBox" style="height:400px; overflow:auto; border:1px solid #ccc;"></div>

<input id="chatInput" placeholder="Message..." />
<button onclick="sendMessage()">Send</button>

<script src="firebase.js"></script>
<script src="script.js"></script>

<script>
const taskId = new URLSearchParams(window.location.search).get("taskId");

firebase.auth().onAuthStateChanged(() => {
  loadChat();
});

function sendMessage() {
  const input = document.getElementById("chatInput");

  if (!input.value) return;

  firebase.firestore()
    .collection("chats")
    .doc(taskId)
    .collection("messages")
    .add({
      senderId: firebase.auth().currentUser.uid,
      text: input.value,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

  input.value = "";
}

function loadChat() {
  const chatBox = document.getElementById("chatBox");

  firebase.firestore()
    .collection("chats")
    .doc(taskId)
    .collection("messages")
    .orderBy("createdAt")
    .onSnapshot(snapshot => {

      chatBox.innerHTML = "";

      snapshot.forEach(doc => {
        const msg = doc.data();
        const me = msg.senderId === firebase.auth().currentUser.uid;

        chatBox.innerHTML += `
          <div style="text-align:${me ? "right" : "left"}">
            <div style="display:inline-block;padding:8px;margin:5px;background:${me ? "#6c4cff" : "#eee"};color:${me ? "#fff" : "#000"}">
              ${msg.text}
            </div>
          </div>
        `;
      });

    });
}
</script>

</body>
</html>
