<!DOCTYPE html>
<html>
<head>
  <title>RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- POPUP -->
  <div id="popup" style="
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #6c4cff;
    color: white;
    padding: 12px 20px;
    border-radius: 10px;
    display: none;
    z-index: 9999;
  "></div>

  <div class="app">

    <!-- HEADER -->
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
      
      <!-- LEFT SIDE -->
      <div>
        <div>RunIT</div>
        <div id="greeting" style="font-size:14px; color:#666;">Loading...</div>
      </div>

      <!-- LOGOUT -->
      <button onclick="logout()" 
        style="padding:6px 10px; border:none; border-radius:6px; background:#ff4d4d; color:white;">
        Logout
      </button>
    </div>

    <!-- WALLET -->
    <div class="card">
      <h3>Wallet Balance</h3>
      <h1>₦<span id="balance">0</span></h1>
    </div>

    <!-- DASHBOARD -->
    <div class="dashboard">

      <div onclick="location.href='post.html'" class="card">
        📌 Post Task
      </div>

      <div onclick="location.href='tasks.html'" class="card">
        📋 Available Tasks
      </div>

      <div onclick="location.href='services.html'" class="card">
        🛠 Services
      </div>

    </div>

  </div>

  <!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

<!-- 🔥 FIXED GREETING LOGIC -->
<script>
firebase.auth().onAuthStateChanged((user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const greetingEl = document.getElementById("greeting");

  firebase.firestore().collection("users").doc(user.uid).get()
    .then((doc) => {

      let name = "";

      if (doc.exists && doc.data().username) {
        name = doc.data().username;
      } else if (user.displayName) {
        name = user.displayName;
      } else {
        greetingEl.innerText = "HELLO USER";
        return;
      }

      const firstName = name.split(" ")[0];
      greetingEl.innerText = "HELLO " + firstName.toUpperCase();

    })
    .catch(() => {
      if (user.displayName) {
        const firstName = user.displayName.split(" ")[0];
        greetingEl.innerText = "HELLO " + firstName.toUpperCase();
      } else {
        greetingEl.innerText = "HELLO USER";
      }
    });
});
</script>

</body>
</html>
