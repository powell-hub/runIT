<!DOCTYPE html>
<html>
<head>
  <title>Add Service</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="header">
    <div>Add Service</div>
  </div>

  <div class="card">

    <input id="serviceName" placeholder="Service name" style="width:100%; padding:10px;"><br><br>

    <input id="serviceDesc" placeholder="Describe your service" style="width:100%; padding:10px;"><br><br>

    <input id="servicePhone" placeholder="Phone number" style="width:100%; padding:10px;"><br><br>

    <input id="servicePrice" placeholder="Price" type="number" style="width:100%; padding:10px;">

  </div>

  <button class="main-btn" onclick="addService()">Add Service</button>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
