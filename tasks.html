<!DOCTYPE html>
<html>
<head>
  <title>Tasks - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="popup" style="
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
  z-index: 9999;
"></div>

<div class="app">

  <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
    <div>Available Tasks</div>

    <button onclick="logout()" style="
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:white;
    ">
      Logout
    </button>
  </div>

  <div id="taskList"></div>

  <div class="nav">
    <div onclick="location.href='index.html'">🏠 Home</div>
    <div>📋 Tasks</div>
    <div onclick="location.href='wallet.html'">💳 Wallet</div>
  </div>

</div>

<script src="./firebase.js"></script>
<script src="./script.js"></script>
  
<!-- 🔥 SAFE FALLBACK INIT -->
<script>
window.addEventListener("load", () => {
  setTimeout(() => {
    if (typeof loadData === "function") loadData();
    if (typeof displayTasks === "function") displayTasks();
  }, 300);
});
</script>

</body>
</html>
