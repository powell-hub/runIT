<!DOCTYPE html>
<html>
<head>
  <title>Tasks - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="popup" style="
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: black;
  color: white;
  padding: 10px 20px;
  border-radius: 8px;
  display: none;
  z-index: 9999;
"></div>
  
<div class="app">

  <!-- HEADER (WITH LOGOUT INSIDE) -->
  <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
    <div>Available Tasks</div>

    <button onclick="logout()" style="
      padding:6px 10px;
      border:none;
      border-radius:6px;
      background:#ff4d4d;
      color:white;
      cursor:pointer;
    ">
      Logout
    </button>
  </div>

  <!-- TASK LIST -->
  <div id="taskList"></div>

  <!-- NAVIGATION -->
  <div class="nav">
    <div onclick="location.href='index.html'">🏠 Home</div>
    <div>📋 Tasks</div>
    <div onclick="location.href='wallet.html'">💳 Wallet</div>
  </div>

</div>

<!-- SCRIPT -->
<script src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
