<!DOCTYPE html>
<html>
<head>
  <title>Post Task - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="header">
    <div>Post a Task</div>
  </div>

  <div class="card">

    <!-- TASK TITLE -->
    <input id="title" placeholder="Task Title"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

    <!-- DESCRIPTION -->
    <input id="description" placeholder="Task Description"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

    <!-- PRICE -->
    <input id="price" type="number" placeholder="Amount (₦)"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

  </div>

  <button class="main-btn" onclick="postTask()">Post Task</button>

  <div id="popup" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    color:white;
    padding:10px 20px;
    border-radius:8px;
  "></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>

<script>
function showPopup(message) {
  const popup = document.getElementById("popup");
  popup.innerText = message;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 2000);
}

function postTask() {
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("description").value.trim();
  const price = document.getElementById("price").value.trim();

  if (!title || !description || !price) {
    showPopup("Fill all fields");
    return;
  }

  const user = firebase.auth().currentUser;

  if (!user) {
    showPopup("Login required");
    return;
  }

  firebase.firestore().collection("tasks").add({
    title: title,
    description: description,
    price: Number(price),
    status: "open",
    createdBy: user.uid,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  })
  .then(() => {
    showPopup("Task posted!");
    setTimeout(() => {
      window.location.href = "tasks.html";
    }, 1000);
  })
  .catch(err => {
    showPopup(err.message);
  });
}
</script>

</body>
</html>
