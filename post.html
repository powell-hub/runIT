<!DOCTYPE html>
<html>
<head>
  <title>Post Task - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>Post Task</div>
  </div>

  <!-- FORM CARD -->
  <div class="card">

    <input 
      id="taskInput" 
      type="text" 
      placeholder="What do you need done?"
      style="width:100%; padding:10px; margin-bottom:10px;"
    >

    <input 
      id="amountInput" 
      type="number" 
      placeholder="Enter amount (₦)"
      style="width:100%; padding:10px;"
    >

  </div>

  <!-- BUTTON -->
  <button class="main-btn" onclick="postTask()">
    Post Task
  </button>

  <!-- NAVIGATION -->
  <div class="nav">
    <div onclick="location.href='index.html'">🏠 Home</div>
    <div onclick="location.href='tasks.html'">📋 Tasks</div>
    <div onclick="location.href='wallet.html'">💳 Wallet</div>
  </div>

</div>

<!-- SCRIPT -->
<script src="script.js"></script>
<div id="popup" style="
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #6c4cff;
  color: white;
  padding: 15px 25px;
  border-radius: 10px;
  display: none;
">
  Task Posted Successfully!
</div>
  
</body>
</html>
