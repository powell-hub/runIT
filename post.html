<!DOCTYPE html>
<html>
<head>
  <title>Post Task - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- POPUP -->
<div id="popup" style="
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #6c4cff;
  color: white;
  padding: 15px 25px;
  border-radius: 10px;
  display: none;
  z-index: 9999;
"></div>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>Post Task</div>
  </div>

  <!-- FORM -->
  <div class="card">

    <input 
      id="taskInput" 
      type="text" 
      placeholder="What do you need done?"
      style="width:100%; padding:10px; margin-bottom:10px;"
    >

    <input 
      id="amountInput" 
      type="number" 
      placeholder="Enter amount (₦)"
      style="width:100%; padding:10px;"
    >

  </div>

  <!-- BUTTON -->
  <button class="main-btn" onclick="postTask()">
    Post Task
  </button>

  <!-- NAV -->
  <div class="nav">
    <div onclick="location.href='index.html'">🏠 Home</div>
    <div onclick="location.href='tasks.html'">📋 Tasks</div>
    <div onclick="location.href='wallet.html'">💳 Wallet</div>
  </div>

</div>

<!-- =========================
     SCRIPTS (FIXED ORDER)
========================= -->

<!-- Firebase Core -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Firebase Config -->
<script src="firebase.js"></script>

<!-- App Logic -->
<script src="script.js"></script>

</body>
</html>
