<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="header">
    <div>RunIT</div>
  </div>

  <h2 style="text-align:center; margin-top:10px;">Create Account 🚀</h2>

  <div class="card">

    <input id="username" placeholder="Full Name"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

    <input id="email" placeholder="Email"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">

  </div>

  <button class="main-btn" onclick="signup()">Create Account</button>

  <p style="text-align:center; margin-top:15px;">
    Already have an account?
    <a href="login.html" style="color:#6c4cff; font-weight:600;">Login</a>
  </p>

  <div id="popup" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    color:white;
    padding:10px 20px;
    border-radius:8px;
  "></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

<script>
function signup() {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !email || !password) {
    showPopup("Fill all fields");
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then((userCredential) => {

      // OPTIONAL: store display name
      userCredential.user.updateProfile({
        displayName: username
      });

      showPopup("Account created!");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1000);

    })
    .catch((error) => {
      showPopup(error.message);
    });
}
</script>

</body>
</html>
