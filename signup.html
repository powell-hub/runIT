<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>RunIT</div>
  </div>

  <!-- TITLE -->
  <h2 style="text-align:center; margin-top:10px;">Create Account 🚀</h2>

  <!-- FORM -->
  <div class="card">
    <input id="username" placeholder="Username"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">
  </div>

  <!-- BUTTON -->
  <button class="main-btn" onclick="signup()">Sign Up</button>

  <!-- LOGIN LINK -->
  <p style="text-align:center; margin-top:15px;">
    Already have an account?
    <span onclick="location.href='login.html'"
      style="color:#6c4cff; cursor:pointer; font-weight:600;">
      Login
    </span>
  </p>

  <!-- POPUP -->
  <div id="popup" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    color:white;
    padding:10px 20px;
    border-radius:8px;
  "></div>

</div>

<script src="script.js"></script>

<script>
function signup() {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user || !pass) {
    showPopup("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // 🚨 CHECK IF USER EXISTS
  const exists = users.find(u => u.username === user);

  if (exists) {
    showPopup("Username already exists");
    return;
  }

  // SAVE USER
  users.push({
    username: user,
    password: pass
  });

  localStorage.setItem("users", JSON.stringify(users));

  showPopup("Account created!");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1000);
}
</script>

</body>
</html>
