<!DOCTYPE html>
<html>
<head>
  <title>Login - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <div class="header">Login</div>

  <div class="card">
    <input id="username" placeholder="Username" style="width:100%; padding:10px;"><br><br>
    <input id="password" type="password" placeholder="Password" style="width:100%; padding:10px;">
  </div>

  <button class="main-btn" onclick="handleLogin()">Login</button>

  <p onclick="location.href='signup.html'">No account? Sign up</p>

</div>

<script src="script.js"></script>

<script>
function handleLogin() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (!user || !pass) {
    showPopup("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const found = users.find(u => u.username === user && u.password === pass);

  if (!found) {
    showPopup("Invalid credentials");
    return;
  }

  localStorage.setItem("currentUser", user);

  location.href = "index.html";
}
</script>

</body>
</html>
