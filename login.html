<!DOCTYPE html>
<html>
<head>
  <title>Login - RunIT</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>RunIT</div>
  </div>

  <!-- GREETING -->
  <h2 style="text-align:center; margin-top:10px;">Welcome Back 👋</h2>

  <!-- FORM -->
  <div class="card">
    <input id="username" placeholder="Username"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">
    
    <input id="password" type="password" placeholder="Password"
      style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">
  </div>

  <!-- LOGIN BUTTON -->
  <button class="main-btn" onclick="handleLogin()">Login</button>

  <!-- ✅ FIXED SIGNUP LINK -->
  <p style="text-align:center; margin-top:15px;">
    No account?
    <a href="signup.html" style="color:#6c4cff; font-weight:600;">
      Sign up
    </a>
  </p>

  <!-- POPUP -->
  <div id="popup" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    color:white;
    padding:10px 20px;
    border-radius:8px;
  "></div>

</div>

<script src="script.js"></script>

<script>
function handleLogin() {
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();

  if (!user || !pass) {
    showPopup("Fill all fields");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const found = users.find(u => u.username === user && u.password === pass);

  if (!found) {
    showPopup("Invalid credentials");
    return;
  }

  localStorage.setItem("currentUser", user);

  showPopup("Login successful");

  setTimeout(() => {
    window.location.href = "index.html";
  }, 1000);
}
</script>

</body>
</html>
