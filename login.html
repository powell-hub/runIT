<!DOCTYPE html>
<html>
<head>
  <title>Login - RunIT</title>
  <link rel="stylesheet" href="style.css">

  <!-- simple icon style -->
  <style>
    .password-wrapper {
      position: relative;
    }

    .toggle-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <div>RunIT</div>
  </div>

  <h2 style="text-align:center; margin-top:10px;">Welcome Back 👋</h2>

  <div class="card">

    <input id="email" placeholder="Email"
      style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;">

    <!-- PASSWORD WITH EYE -->
    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Password"
        style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc;">

      <span class="toggle-eye" onclick="togglePassword()">👁️</span>
    </div>

  </div>

  <button class="main-btn" onclick="handleLogin()">Login</button>

  <p style="text-align:center; margin-top:15px;">
    No account?
    <a href="signup.html" style="color:#6c4cff; font-weight:600;">Sign up</a>
  </p>

  <div id="popup" style="
    display:none;
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:black;
    color:white;
    padding:10px 20px;
    border-radius:8px;
  "></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

<script>
// POPUP
function showPopup(message) {
  const popup = document.getElementById("popup");
  popup.innerText = message;
  popup.style.display = "block";

  setTimeout(() => {
    popup.style.display = "none";
  }, 2000);
}

// TOGGLE PASSWORD 👁️
function togglePassword() {
  const input = document.getElementById("password");

  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }
}

// LOGIN
function handleLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    showPopup("Fill all fields");
    return;
  }

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      showPopup("Login successful");

      setTimeout(() => {
        window.location.href = "index.html";
      }, 1000);

    })
    .catch((error) => {
      showPopup(error.message);
    });
}
</script>

</body>
</html>
